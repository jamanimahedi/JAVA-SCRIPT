<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slider Project</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="slider-wrapper">

    <h1 class="main-heading">Slider Project</h1>

    <button class="side-btn left" onclick="prevSlide()">&#10094;</button>

    <div class="glass-card">
      <img id="sliderImage" src="" alt="slider image">
      <h2 id="title"></h2>
      <p id="desc"></p>
    </div>

    <button class="side-btn right" onclick="nextSlide()">&#10095;</button>

  </div>

  <script src="script.js"></script>
</body>

</html>
