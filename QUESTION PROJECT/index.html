<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="style.css">
</head>

<body>




    <div class="container">
        <div class="card p-4 text-center">
            <h1>Quiz Application</h1>
            <br>
            <div class="d-flex justify-content-between">
                <span id="qnsIndexHTML">qns 1/10</span>
                <span class="text-danger" id="qnsTimer">30</span>
            </div>
            <br>
            <br>

            <div id="qnsDiv" class="text-center">
                <h3 id="qns" class="text-center mb-4">questions</h3>
            </div>
            <p>options :</p>
            <div id="options" class="row g-2 p-3"></div>

            <br>

            <button class="btn btn-outline-primary" id="nextbtn" onclick="nextqns()">next</button>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="script.js"></script>
</body>

</html>
